name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli
      - name: Create TWA config
        run: echo 'com.mathiasmusk.zip2ph' > package.txt
      - name: Init Bubblewrap
        run: bubblewrap init --manifest=https://mathiasmusk0.github.io/manifest.json --packageId=$(cat package.txt) --name="Zip2PH" --launcherName="Zip2PH" --startUrl="https://mathiasmusk0.github.io" --themeColor="#8B5CF6" --skipPwaValidation
      - name: Build APK
        run: bubblewrap build
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zip2PH-APK
          path: app-release-signed.apk